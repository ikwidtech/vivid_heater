# ViViD Dryer — idle timeout guard
# Prevents Klipper's idle_timeout from killing dryer heaters during active
# dry cycles.
#
# To use: In your [idle_timeout] section, set:
#   gcode: _VIVID_IDLE_TIMEOUT_CHECK
#
# Or if you already have an idle timeout macro, call
# _VIVID_IDLE_TIMEOUT_CHECK at the top of it.

[gcode_macro _VIVID_IDLE_TIMEOUT_CHECK]
description: Check all ViViD dryer instances before idle shutdown
gcode:
    {% set ns = namespace(dryer_active=false) %}
    {% for key in printer %}
        {% if key.startswith('vivid_dryer') and printer[key].active %}
            {% set ns.dryer_active = true %}
        {% endif %}
    {% endfor %}
    {% if ns.dryer_active %}
        { action_respond_info("ViViD dryer cycle active — skipping idle heater shutdown") }
    {% else %}
        TURN_OFF_HEATERS
        M84
    {% endif %}
