# idle_timeout_guard.cfg
# Prevents Klipper's idle timeout from turning off the heater while the
# ViViD dryer is running a cycle.
#
# How to wire this in:
#
#   [idle_timeout]
#   gcode:
#     _IDLE_TIMEOUT_GUARD
#   timeout: 600   # seconds — adjust to taste
#
# When the idle timeout fires, _IDLE_TIMEOUT_GUARD checks whether the
# dryer is active.  If it is, the printer stays on.  If not, heaters and
# steppers are shut down as normal.

[gcode_macro _IDLE_TIMEOUT_GUARD]
description: Idle-timeout handler that respects an active ViViD dryer cycle
gcode:
    {% if printer['vivid_dryer'].active %}
        # Dryer is running — do NOT turn off heaters.
        { action_respond_info("Idle timeout: ViViD dryer is active — keeping heaters on.") }
    {% else %}
        # Dryer is idle — normal idle shutdown.
        { action_respond_info("Idle timeout: turning off heaters and disabling steppers.") }
        TURN_OFF_HEATERS
        M84
    {% endif %}
