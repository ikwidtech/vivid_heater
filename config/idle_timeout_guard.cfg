# idle_timeout_guard.cfg — Prevents Klipper's idle timeout from turning off
# heaters while any ViViD dryer cycle is running.
#
# How to enable
# -------------
# 1. Include this file in printer.cfg:
#      [include idle_timeout_guard.cfg]
#
# 2. Configure [idle_timeout] to call the guard macro instead of the default
#    shutdown behaviour:
#      [idle_timeout]
#      gcode:
#        _VIVID_IDLE_TIMEOUT_CHECK
#      timeout: 600   # seconds before the idle check fires
#
# When the timeout fires, _VIVID_IDLE_TIMEOUT_CHECK iterates over all printer
# objects whose key begins with "vivid_dryer".  If any instance reports
# active=True the shutdown is suppressed and a message is logged.  Only when
# ALL instances are idle are TURN_OFF_HEATERS and M84 executed.

[gcode_macro _VIVID_IDLE_TIMEOUT_CHECK]
description: Idle-timeout handler that keeps the printer on while any ViViD dryer is active
gcode:
    {% set ns = namespace(any_active=false) %}
    {% for key in printer %}
        {% if key.startswith('vivid_dryer') %}
            {% if printer[key].active %}
                {% set ns.any_active = true %}
            {% endif %}
        {% endif %}
    {% endfor %}
    {% if ns.any_active %}
        { action_respond_info("Idle timeout: ViViD dryer is active — keeping heaters on.") }
    {% else %}
        { action_respond_info("Idle timeout: no dryer active — turning off heaters and steppers.") }
        TURN_OFF_HEATERS
        M84
    {% endif %}
