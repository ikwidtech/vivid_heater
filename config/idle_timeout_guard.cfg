# idle_timeout_guard.cfg
# Prevents Klipper's idle timeout from turning off heaters while any ViViD
# dryer unit is running a drying cycle.
#
# Wire this into your [idle_timeout] section in printer.cfg:
#
#   [idle_timeout]
#   gcode:
#     _VIVID_IDLE_TIMEOUT_CHECK
#   timeout: 600   # seconds — adjust to taste
#
# The macro loops over ALL vivid_dryer instances.  If any one is active the
# heaters and steppers stay on.  If all are idle the normal shutdown runs.

[gcode_macro _VIVID_IDLE_TIMEOUT_CHECK]
description: Check all ViViD dryer instances before idle shutdown
gcode:
    {% set ns = namespace(dryer_active=false) %}
    {% for key in printer %}
        {% if key.startswith('vivid_dryer') and printer[key].active %}
            {% set ns.dryer_active = true %}
        {% endif %}
    {% endfor %}
    {% if ns.dryer_active %}
        { action_respond_info("ViViD dryer cycle active — skipping idle heater shutdown") }
    {% else %}
        TURN_OFF_HEATERS
        M84
    {% endif %}
