# vivid_dryer.cfg — ViViD Dryer Klipper configuration
#
# This file configures the vivid_dryer Klipper extra for your ViViD filament
# dryer.  Your heater_generic, aht10 sensor, and fan sections MUST be defined
# in printer.cfg (or another included file) — do NOT add them here.
#
# Installation
# ------------
# 1. Copy klippy/extras/vivid_dryer.py  →  ~/klipper/klippy/extras/
# 2. Add to printer.cfg:
#      [include vivid_dryer.cfg]
# 3. Optionally add:
#      [include mainsail/vivid_dryer_panel.cfg]
#      [include idle_timeout_guard.cfg]
# 4. Run: FIRMWARE_RESTART
#
# Multiple units
# --------------
# Uncomment and duplicate the [vivid_dryer Vivid_2] block below, adjusting
# heater and humidity_sensor names to match your printer.cfg.

# ---------------------------------------------------------------------------
# Primary unit — Vivid_1
# ---------------------------------------------------------------------------
[vivid_dryer Vivid_1]
# Name of the [heater_generic] block defined in printer.cfg.
heater: Vivid_1_dryer

# Comma-separated list of AHT3X sensor object names.
# AHT3X sensors register in Klipper as "aht10 <name>" — NOT temperature_sensor.
# Humidity is averaged across all listed sensors.
humidity_sensor: aht10 Vivid_1_dryer_left, aht10 Vivid_1_dryer_right

# Default heater setpoint when TEMP is not specified (°C, max 75).
default_temp: 55.0

# Default timed-mode duration when no HOURS/MINUTES/SECONDS are given (seconds).
default_duration: 14400   # 4 hours

# ±% RH deadband around target humidity where no temperature change is made.
humidity_deadband: 3.0

# Seconds between humidity reads and heater-temp adjustments in humidity-hold mode.
humidity_poll_interval: 30

# ---------------------------------------------------------------------------
# Second unit — Vivid_2 (example, uncomment to enable)
# ---------------------------------------------------------------------------
# [vivid_dryer Vivid_2]
# heater: Vivid_2_dryer
# humidity_sensor: aht10 Vivid_2_dryer_left, aht10 Vivid_2_dryer_right
# default_temp: 55.0
# default_duration: 14400
# humidity_deadband: 3.0
# humidity_poll_interval: 30
