# ViViD Dryer Controller — add ONE section per physical ViViD unit
#
# This file ONLY contains the [vivid_dryer] controller section(s).
# The following blocks must already exist in your printer.cfg per unit:
#   [temperature_sensor <Name>_dryer_left]   (AHT3X, software I2C)
#   [temperature_sensor <Name>_dryer_right]  (AHT3X, software I2C)
#   [heater_generic <Name>_dryer]            (temperature_combined)
#   [verify_heater <Name>_dryer]
#   [heater_fan <Name>_dryer_fan]
#
# Installation:
#   1. Copy vivid_dryer.py to ~/klipper/klippy/extras/
#   2. Add [include vivid_dryer.cfg] to printer.cfg
#   3. Restart Klipper: sudo systemctl restart klipper
#
# GCode commands per instance:
#   VIVID_DRY_START_VIVID_1 TEMP=55 HOURS=4
#   VIVID_DRY_START_VIVID_1 HUMIDITY=30 TEMP_MAX=55 TEMP_MIN=35
#   VIVID_DRY_STOP_VIVID_1
#   VIVID_DRY_STATUS_VIVID_1

[vivid_dryer Vivid_1]
heater:                 Vivid_1_dryer
humidity_sensor:        aht10 Vivid_1_dryer_left, aht10 Vivid_1_dryer_right
default_temp:           55.0
default_duration:       14400
humidity_deadband:      3.0
humidity_poll_interval: 30

# Uncomment for a second ViViD unit:
# [vivid_dryer Vivid_2]
# heater:                 Vivid_2_dryer
# humidity_sensor:        aht10 Vivid_2_dryer_left, aht10 Vivid_2_dryer_right
# default_temp:           55.0
# default_duration:       14400
# humidity_deadband:      3.0
# humidity_poll_interval: 30
