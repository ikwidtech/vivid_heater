# ViViD Dryer — Klipper config
# Copy this file into your Klipper config directory and add:
#   [include vivid_dryer.cfg]
# to printer.cfg

[heater_generic Vivid_1_dryer]
heater_pin: # TODO: set your heater pin, e.g. PA1
sensor_type: Generic 3950   # or your actual sensor type
sensor_pin: # TODO: set your sensor pin, e.g. PB0
control: pid
# These are example PID values. Run PID_CALIBRATE HEATER=Vivid_1_dryer TARGET=55
# after installation to tune them for your specific hardware.
pid_kp: 10.0
pid_ki: 0.5
pid_kd: 50.0
min_temp: 0
max_temp: 70

# Optional: if your ViViD dryer has an SHT31 or similar humidity sensor
# connected via I2C, configure it as a temperature_sensor here.
# The 'humidity' field must be available in get_status().
# Example for a custom sensor that reports humidity:
# [temperature_sensor vivid_humidity]
# sensor_type: SHT31   # requires a Klipper SHT31 extra
# i2c_address: 68
# i2c_mcu: mcu

[vivid_dryer]
heater: Vivid_1_dryer
# humidity_sensor: vivid_humidity   # uncomment when humidity sensor is wired
default_temp: 55.0
default_duration: 14400   # 4 hours in seconds
humidity_deadband: 3.0
humidity_poll_interval: 30
