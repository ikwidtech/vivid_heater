<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ViViD Dryer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Roboto', 'Segoe UI', sans-serif;
      background: #1e1e1e;
      color: #ffffff;
      padding: 16px;
      min-height: 100vh;
    }

    h1 {
      font-size: 1.2rem;
      font-weight: 500;
      color: #bdbdbd;
      margin-bottom: 16px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    #cards { display: flex; flex-wrap: wrap; gap: 16px; }

    .card {
      background: #2d2d2d;
      border-radius: 8px;
      padding: 16px;
      min-width: 320px;
      max-width: 480px;
      flex: 1 1 320px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .card-title {
      font-size: 1rem;
      font-weight: 600;
      color: #e0e0e0;
    }

    .badge {
      font-size: 0.7rem;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .badge-idle     { background: #555; color: #bbb; }
    .badge-timed    { background: #1565c0; color: #fff; }
    .badge-humidity { background: #1b5e20; color: #fff; }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 12px;
    }
    .stat {
      background: #383838;
      border-radius: 6px;
      padding: 8px 12px;
    }
    .stat-label {
      font-size: 0.68rem;
      color: #9e9e9e;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 2px;
    }
    .stat-value {
      font-size: 1.05rem;
      font-weight: 600;
      color: #e0e0e0;
    }
    .stat-value.accent { color: #2196f3; }
    .stat-value.green  { color: #4caf50; }
    .stat-value.large  { font-size: 1.6rem; }
    .stat-value.amber  { color: #ffa726; }

    .humidity-row {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }
    .humidity-row .stat { flex: 1; }

    .progress-wrap {
      background: #444;
      border-radius: 4px;
      height: 6px;
      overflow: hidden;
      margin-bottom: 12px;
    }
    .progress-bar {
      height: 100%;
      background: #2196f3;
      border-radius: 4px;
      transition: width 1s linear;
    }

    .sparkline-wrap { margin-bottom: 12px; }
    .sparkline-wrap canvas {
      width: 100%;
      height: 48px;
      display: block;
      border-radius: 4px;
      background: #383838;
    }

    .section-title {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #757575;
      margin: 12px 0 8px;
    }

    .controls { display: flex; flex-direction: column; gap: 8px; }

    .input-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .input-group {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-width: 70px;
    }
    .input-group label {
      font-size: 0.65rem;
      color: #9e9e9e;
      margin-bottom: 3px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .input-group input {
      background: #424242;
      border: 1px solid #555;
      color: #e0e0e0;
      border-radius: 4px;
      padding: 5px 8px;
      font-size: 0.85rem;
      width: 100%;
      outline: none;
    }
    .input-group input:focus { border-color: #2196f3; }

    .btn-row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }

    button {
      padding: 7px 14px;
      border: none;
      border-radius: 4px;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.03em;
      transition: opacity .15s;
    }
    button:hover { opacity: .85; }
    button:active { opacity: .7; }
    button:disabled { opacity: .4; cursor: not-allowed; }

    .btn-primary { background: #2196f3; color: #fff; }
    .btn-success { background: #388e3c; color: #fff; }
    .btn-danger  { background: #c62828; color: #fff; }

    .divider {
      border: none;
      border-top: 1px solid #444;
      margin: 10px 0;
    }

    .error-msg {
      background: #b71c1c;
      color: #fff;
      border-radius: 6px;
      padding: 10px 14px;
      font-size: 0.85rem;
    }

    #loading {
      color: #757575;
      font-size: 0.95rem;
      padding: 16px 0;
    }
  </style>
</head>
<body>
  <h1>ViViD Dryer</h1>
  <div id="loading">Connecting to Moonraker…</div>
  <div id="cards"></div>

  <script>
  (function () {
    'use strict';

    const BASE = (window.location.hostname === '' || window.location.protocol === 'file:')
      ? (window.location.protocol === 'https:' ? 'https:' : 'http:') + '//localhost:7125'
      : window.location.origin;

    // Per-instance state
    const state = {};   // key: instance name, value: { history: [], startSec, durationSec }
    let pollTimer = null;

    // ----------------------------------------------------------------
    // Moonraker API helpers
    // ----------------------------------------------------------------
    async function apiGet(path) {
      const r = await fetch(BASE + path);
      if (!r.ok) throw new Error(r.status + ' ' + r.statusText);
      return r.json();
    }

    async function sendGcode(script) {
      const r = await fetch(BASE + '/printer/gcode/script', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ script })
      });
      if (!r.ok) throw new Error(r.status + ' ' + r.statusText);
    }

    // ----------------------------------------------------------------
    // Discovery
    // ----------------------------------------------------------------
    async function discoverInstances() {
      const data = await apiGet('/printer/objects/list');
      const objects = data.result && data.result.objects ? data.result.objects : [];
      return objects
        .filter(k => k === 'vivid_dryer' || k.startsWith('vivid_dryer '))
        .map(k => {
          const name = k === 'vivid_dryer' ? '' : k.slice('vivid_dryer '.length);
          return { key: k, name };
        });
    }

    // ----------------------------------------------------------------
    // Build query URL for one instance
    // ----------------------------------------------------------------
    function buildQueryUrl(inst) {
      const heater = 'Vivid_1_dryer';  // fallback; overridden after first poll
      const key = encodeURIComponent(inst.key);
      let url = `/printer/objects/query?${key}`;

      // We'll append heater and sensor queries after we know the names
      if (inst.heaterName) {
        url += '&heater_generic ' + encodeURIComponent(inst.heaterName);
      }
      if (inst.sensorLeftName) {
        url += '&temperature_sensor ' + encodeURIComponent(inst.sensorLeftName);
      }
      if (inst.sensorRightName) {
        url += '&temperature_sensor ' + encodeURIComponent(inst.sensorRightName);
      }
      if (inst.ptcName) {
        url += '&temperature_sensor ' + encodeURIComponent(inst.ptcName);
      }
      return url;
    }

    // ----------------------------------------------------------------
    // Poll all instances
    // ----------------------------------------------------------------
    async function pollAll(instances) {
      for (const inst of instances) {
        try {
          await pollInstance(inst);
        } catch (e) {
          setError(inst.name || 'default', e.message);
        }
      }
    }

    async function pollInstance(inst) {
      // Build query with all relevant objects
      const nameSuffix = inst.name ? ' ' + inst.name : '';
      const heaterKey  = 'heater_generic ' + inst.name + '_dryer';
      const leftKey    = 'temperature_sensor ' + inst.name + '_dryer_left';
      const rightKey   = 'temperature_sensor ' + inst.name + '_dryer_right';
      const ptcKey     = 'temperature_sensor ' + inst.name + '_PTC_temp';

      const params = [
        encodeURIComponent(inst.key),
        encodeURIComponent(heaterKey),
        encodeURIComponent(leftKey),
        encodeURIComponent(rightKey),
        encodeURIComponent(ptcKey),
      ].join('&');

      const data = await apiGet('/printer/objects/query?' + params);
      const res  = data.result && data.result.status ? data.result.status : {};

      const dryer   = res[inst.key]           || {};
      const heater  = res[heaterKey]          || {};
      const left    = res[leftKey]            || {};
      const right   = res[rightKey]           || {};
      const ptc     = res[ptcKey]             || {};

      const s = state[inst.name] || (state[inst.name] = { history: [] });

      // Track history
      if (dryer.active) {
        s.history.push(dryer.current_humidity || 0);
        if (s.history.length > 30) s.history.shift();
      }

      updateCard(inst, dryer, heater, left, right, ptc, s);
    }

    // ----------------------------------------------------------------
    // Render a card
    // ----------------------------------------------------------------
    function updateCard(inst, dryer, heater, left, right, ptc, s) {
      const id = 'card-' + safeName(inst.name || 'default');
      let card = document.getElementById(id);
      if (!card) {
        card = createCard(inst);
        document.getElementById('cards').appendChild(card);
        document.getElementById('loading').style.display = 'none';
      }

      const mode   = dryer.mode   || 'idle';
      const active = dryer.active || false;

      // Badge
      const badge = card.querySelector('.badge');
      badge.className = 'badge badge-' + mode;
      badge.textContent = mode.toUpperCase();

      // Heater temps
      const currentTemp = heater.temperature != null ? heater.temperature.toFixed(1) : '--';
      const targetTemp  = active ? (dryer.target_temp != null ? dryer.target_temp.toFixed(1) : '--') : '0.0';
      setVal(card, 'stat-heater', currentTemp + ' / ' + targetTemp + ' °C');

      // Humidity stats
      const avgHum   = dryer.current_humidity       != null ? dryer.current_humidity.toFixed(1)       : '--';
      const leftHum  = dryer.current_humidity_left  != null ? dryer.current_humidity_left.toFixed(1)  : (left.humidity  != null ? left.humidity.toFixed(1)  : '--');
      const rightHum = dryer.current_humidity_right != null ? dryer.current_humidity_right.toFixed(1) : (right.humidity != null ? right.humidity.toFixed(1) : '--');

      setVal(card, 'stat-avg-hum', avgHum + ' %');
      setVal(card, 'stat-left-hum',  leftHum  + ' %');
      setVal(card, 'stat-right-hum', rightHum + ' %');

      // PTC temp
      if (ptc.temperature != null) {
        setVal(card, 'stat-ptc', ptc.temperature.toFixed(1) + ' °C');
        card.querySelector('.stat-ptc-row').style.display = '';
      } else {
        card.querySelector('.stat-ptc-row').style.display = 'none';
      }

      // Time remaining
      const remaining = dryer.remaining_seconds || 0;
      const remStr = mode === 'humidity' && remaining === 0
        ? '∞'
        : fmtDuration(remaining);
      setVal(card, 'stat-remaining', remStr);

      // Progress bar (timed mode)
      const progWrap = card.querySelector('.progress-wrap');
      if (mode === 'timed' && active) {
        progWrap.style.display = '';
        const total = s.durationSec || 1;
        const pct = Math.max(0, Math.min(100, (1 - remaining / total) * 100));
        card.querySelector('.progress-bar').style.width = pct + '%';
      } else {
        progWrap.style.display = 'none';
      }

      // Store duration for progress bar
      if (mode === 'timed' && active && !s.durationSec) {
        s.durationSec = remaining;
      }
      if (!active) s.durationSec = null;

      // Sparkline
      drawSparkline(card.querySelector('canvas'), s.history);

      // Stop button visibility
      card.querySelector('.btn-stop').style.display = active ? '' : 'none';
    }

    // ----------------------------------------------------------------
    // Create card DOM
    // ----------------------------------------------------------------
    function createCard(inst) {
      const id   = 'card-' + safeName(inst.name || 'default');
      const label = inst.name ? 'ViViD Dryer — ' + inst.name : 'ViViD Dryer';
      const suffix = inst.name
        ? '_' + inst.name.toUpperCase().replace(/\s+/g, '_')
        : '';

      const card = document.createElement('div');
      card.className = 'card';
      card.id = id;

      card.innerHTML = `
        <div class="card-header">
          <div class="card-title">${esc(label)}</div>
          <span class="badge badge-idle">IDLE</span>
        </div>

        <div class="stats-grid">
          <div class="stat">
            <div class="stat-label">Heater (cur / tgt)</div>
            <div class="stat-value accent" data-key="stat-heater">-- / -- °C</div>
          </div>
          <div class="stat">
            <div class="stat-label">Avg Humidity</div>
            <div class="stat-value green large" data-key="stat-avg-hum">-- %</div>
          </div>
        </div>

        <div class="humidity-row">
          <div class="stat">
            <div class="stat-label">Left Humidity</div>
            <div class="stat-value" data-key="stat-left-hum">-- %</div>
          </div>
          <div class="stat">
            <div class="stat-label">Right Humidity</div>
            <div class="stat-value" data-key="stat-right-hum">-- %</div>
          </div>
        </div>

        <div class="stats-grid stat-ptc-row" style="display:none">
          <div class="stat">
            <div class="stat-label">PTC Ambient</div>
            <div class="stat-value amber" data-key="stat-ptc">-- °C</div>
          </div>
          <div class="stat">
            <div class="stat-label">Time Remaining</div>
            <div class="stat-value" data-key="stat-remaining">--</div>
          </div>
        </div>
        <div class="stats-grid no-ptc-row">
          <div class="stat" style="display:none" data-ptc-placeholder></div>
          <div class="stat">
            <div class="stat-label">Time Remaining</div>
            <div class="stat-value" data-key="stat-remaining-2">--</div>
          </div>
        </div>

        <div class="progress-wrap" style="display:none">
          <div class="progress-bar" style="width:0%"></div>
        </div>

        <div class="sparkline-wrap">
          <canvas width="400" height="48" title="Humidity history (last 30 readings)"></canvas>
        </div>

        <div class="section-title">Timed Mode</div>
        <div class="controls">
          <div class="input-row">
            <div class="input-group">
              <label>Temp °C</label>
              <input type="number" class="in-timed-temp" value="55" min="1" max="75" step="1">
            </div>
            <div class="input-group">
              <label>Hours</label>
              <input type="number" class="in-timed-hours" value="4" min="0" step="1">
            </div>
            <div class="input-group">
              <label>Minutes</label>
              <input type="number" class="in-timed-mins" value="0" min="0" max="59" step="1">
            </div>
          </div>
          <div class="btn-row">
            <button class="btn-primary btn-timed">▶ Start Timed Dry</button>
          </div>
        </div>

        <hr class="divider">

        <div class="section-title">Humidity-Hold Mode</div>
        <div class="controls">
          <div class="input-row">
            <div class="input-group">
              <label>Target %RH</label>
              <input type="number" class="in-hum-target" value="30" min="1" max="99" step="1">
            </div>
            <div class="input-group">
              <label>Max Temp °C</label>
              <input type="number" class="in-hum-tmax" value="55" min="1" max="75" step="1">
            </div>
            <div class="input-group">
              <label>Min Temp °C</label>
              <input type="number" class="in-hum-tmin" value="35" min="1" max="75" step="1">
            </div>
            <div class="input-group">
              <label>Max Hours (0=∞)</label>
              <input type="number" class="in-hum-maxh" value="0" min="0" step="1">
            </div>
          </div>
          <div class="btn-row">
            <button class="btn-success btn-humidity">💧 Start Humidity Hold</button>
          </div>
        </div>

        <hr class="divider">

        <div class="btn-row">
          <button class="btn-danger btn-stop" style="display:none">⏹ Stop</button>
        </div>
      `;

      // Wire up buttons
      card.querySelector('.btn-timed').addEventListener('click', async () => {
        const temp  = parseFloat(card.querySelector('.in-timed-temp').value)  || 55;
        const hours = parseFloat(card.querySelector('.in-timed-hours').value) || 0;
        const mins  = parseFloat(card.querySelector('.in-timed-mins').value)  || 0;
        const cmd = `VIVID_DRY_START${suffix} TEMP=${temp} HOURS=${hours} MINUTES=${mins}`;
        await runGcode(cmd);
      });

      card.querySelector('.btn-humidity').addEventListener('click', async () => {
        const hum  = parseFloat(card.querySelector('.in-hum-target').value) || 30;
        const tmax = parseFloat(card.querySelector('.in-hum-tmax').value)   || 55;
        const tmin = parseFloat(card.querySelector('.in-hum-tmin').value)   || 35;
        const maxh = parseFloat(card.querySelector('.in-hum-maxh').value)   || 0;
        const cmd = `VIVID_DRY_START${suffix} HUMIDITY=${hum} TEMP_MAX=${tmax} TEMP_MIN=${tmin} MAX_HOURS=${maxh}`;
        await runGcode(cmd);
      });

      card.querySelector('.btn-stop').addEventListener('click', async () => {
        await runGcode('VIVID_DRY_STOP' + suffix);
      });

      return card;
    }

    // ----------------------------------------------------------------
    // Sparkline
    // ----------------------------------------------------------------
    function drawSparkline(canvas, data) {
      const ctx = canvas.getContext('2d');
      const w   = canvas.width;
      const h   = canvas.height;
      ctx.clearRect(0, 0, w, h);

      if (!data || data.length < 2) {
        ctx.fillStyle = '#383838';
        ctx.fillRect(0, 0, w, h);
        return;
      }

      const mn = Math.max(0,   Math.min(...data) - 5);
      const mx = Math.min(100, Math.max(...data) + 5);
      const range = mx - mn || 1;

      ctx.fillStyle = '#383838';
      ctx.fillRect(0, 0, w, h);

      ctx.beginPath();
      ctx.strokeStyle = '#4caf50';
      ctx.lineWidth = 2;

      data.forEach((v, i) => {
        const x = (i / (data.length - 1)) * w;
        const y = h - ((v - mn) / range) * (h - 6) - 3;
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      });
      ctx.stroke();
    }

    // ----------------------------------------------------------------
    // Helpers
    // ----------------------------------------------------------------
    function setVal(card, key, val) {
      const el = card.querySelector('[data-key="' + key + '"]');
      if (el) el.textContent = val;
      // also handle the duplicate remaining stat
      const el2 = card.querySelector('[data-key="' + key + '-2"]');
      if (el2) el2.textContent = val;
    }

    function setError(name, msg) {
      const id = 'card-' + safeName(name || 'default');
      let card = document.getElementById(id);
      if (!card) {
        card = document.createElement('div');
        card.className = 'card';
        card.id = id;
        document.getElementById('cards').appendChild(card);
        document.getElementById('loading').style.display = 'none';
      }
      card.innerHTML = `<div class="error-msg">⚠ ${esc(msg)}</div>`;
    }

    async function runGcode(script) {
      try {
        await sendGcode(script);
      } catch (e) {
        alert('GCode error: ' + e.message);
      }
    }

    function fmtDuration(sec) {
      if (!isFinite(sec) || sec < 0) return '--';
      const h = Math.floor(sec / 3600);
      const m = Math.floor((sec % 3600) / 60);
      const s = Math.floor(sec % 60);
      return String(h).padStart(2, '0') + ':' +
             String(m).padStart(2, '0') + ':' +
             String(s).padStart(2, '0');
    }

    function safeName(n) {
      return n.replace(/[^a-zA-Z0-9_-]/g, '_');
    }

    function esc(s) {
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    // ----------------------------------------------------------------
    // Main loop
    // ----------------------------------------------------------------
    let instances = [];

    async function init() {
      try {
        instances = await discoverInstances();
        if (instances.length === 0) {
          document.getElementById('loading').textContent =
            'No vivid_dryer instances found in Klipper objects list.';
          return;
        }
        document.getElementById('loading').style.display = 'none';
        await pollAll(instances);
        pollTimer = setInterval(() => pollAll(instances), 5000);
      } catch (e) {
        document.getElementById('loading').innerHTML =
          '<div class="error-msg">⚠ Cannot reach Moonraker at ' +
          esc(BASE) + ': ' + esc(e.message) + '</div>';
      }
    }

    init();
  })();
  </script>
</body>
</html>
