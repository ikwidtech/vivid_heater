<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ViViD Dryer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Roboto, Arial, sans-serif;
      background: #121212;
      color: #e0e0e0;
      min-height: 100vh;
      padding: 16px;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 600;
      color: #90caf9;
      margin-bottom: 16px;
      letter-spacing: 0.5px;
    }

    #instances {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
    }

    .card {
      background: #1e1e1e;
      border: 1px solid #2c2c2c;
      border-radius: 8px;
      padding: 16px;
      min-width: 320px;
      max-width: 440px;
      flex: 1 1 320px;
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .card-title {
      font-size: 1rem;
      font-weight: 600;
      color: #cfd8dc;
    }

    .badge {
      padding: 2px 10px;
      border-radius: 12px;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.8px;
      text-transform: uppercase;
    }
    .badge-idle    { background: #424242; color: #9e9e9e; }
    .badge-timed   { background: #0d47a1; color: #90caf9; }
    .badge-humidity { background: #1b5e20; color: #81c784; }
    .badge-offline { background: #b71c1c; color: #ef9a9a; }

    .stat-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px 16px;
      margin-bottom: 14px;
    }

    .stat-item label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: #757575;
      display: block;
      margin-bottom: 2px;
    }

    .stat-item .val {
      font-size: 1.05rem;
      font-weight: 600;
      color: #e0e0e0;
    }

    .stat-item .val.hot  { color: #ef9a9a; }
    .stat-item .val.cool { color: #90caf9; }
    .stat-item .val.ok   { color: #81c784; }

    /* Progress bar */
    .progress-wrap {
      margin-bottom: 12px;
    }
    .progress-label {
      font-size: 0.75rem;
      color: #757575;
      display: flex;
      justify-content: space-between;
      margin-bottom: 4px;
    }
    .progress-bar-bg {
      background: #2c2c2c;
      border-radius: 4px;
      height: 6px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      border-radius: 4px;
      background: #4fc3f7;
      transition: width 0.5s ease;
    }

    /* Sparkline */
    .sparkline-wrap {
      margin-bottom: 14px;
    }
    .sparkline-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: #757575;
      margin-bottom: 4px;
    }
    svg.sparkline {
      width: 100%;
      height: 60px;
      display: block;
      background: #2c2c2c;
      border-radius: 4px;
    }

    /* Controls */
    .controls { margin-top: 14px; }

    .form-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 8px;
      align-items: flex-end;
    }

    .form-field {
      display: flex;
      flex-direction: column;
      flex: 1 1 60px;
    }

    .form-field label {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #757575;
      margin-bottom: 3px;
    }

    .form-field input {
      background: #2c2c2c;
      border: 1px solid #424242;
      border-radius: 4px;
      color: #e0e0e0;
      padding: 5px 7px;
      font-size: 0.85rem;
      width: 100%;
    }

    .form-field input:focus {
      outline: none;
      border-color: #4fc3f7;
    }

    .section-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: #616161;
      margin-bottom: 6px;
      margin-top: 10px;
    }

    button {
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.82rem;
      font-weight: 600;
      padding: 6px 14px;
      transition: opacity 0.15s;
    }
    button:hover { opacity: 0.85; }
    button:active { opacity: 0.7; }

    .btn-timed  { background: #1565c0; color: #e3f2fd; }
    .btn-humid  { background: #2e7d32; color: #e8f5e9; }
    .btn-stop   { background: #c62828; color: #ffebee; }
    .btn-row    { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 4px; }

    hr.divider {
      border: none;
      border-top: 1px solid #2c2c2c;
      margin: 12px 0;
    }

    /* Toast */
    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: #37474f;
      color: #e0e0e0;
      padding: 10px 20px;
      border-radius: 6px;
      font-size: 0.85rem;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      z-index: 1000;
      white-space: nowrap;
    }
    #toast.show { opacity: 1; }
    #toast.err  { background: #b71c1c; }

    .offline-banner {
      text-align: center;
      color: #ef9a9a;
      padding: 24px;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <h1>&#x1F9C3; ViViD Dryer</h1>
  <div id="instances"><p style="color:#757575;font-size:0.85rem;">Connecting to Moonraker…</p></div>
  <div id="toast"></div>

  <script>
    'use strict';

    const POLL_MS = 5000;
    // Set BASE to your Moonraker URL when serving the widget from a different origin,
    // e.g. 'http://192.168.1.100:7125'.  Moonraker must have CORS enabled for that
    // origin in moonraker.conf (cors_domains).  Leave empty for same-origin use.
    const BASE = '';

    let instances = [];         // array of printer object keys, e.g. ["vivid_dryer Vivid_1"]
    let sparkData = {};         // { key: [ {t, h} ] }   — humidity history per instance
    // { key: { remaining, totalSecs, lastPoll } }
    let countdownState = {};
    let tickTimer = null;

    // ------------------------------------------------------------------
    // Moonraker API helpers
    // ------------------------------------------------------------------

    async function apiGet(path) {
      const res = await fetch(BASE + path);
      if (!res.ok) throw new Error('HTTP ' + res.status);
      return res.json();
    }

    async function sendGCode(script) {
      const res = await fetch(BASE + '/printer/gcode/script', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ script }),
      });
      if (!res.ok) throw new Error('HTTP ' + res.status);
    }

    // ------------------------------------------------------------------
    // Instance discovery
    // ------------------------------------------------------------------

    async function discoverInstances() {
      const data = await apiGet('/printer/objects/list');
      const objects = data.result.objects;
      instances = objects.filter(
        k => k === 'vivid_dryer' || k.startsWith('vivid_dryer ')
      );
      instances.forEach(k => {
        if (!sparkData[k]) sparkData[k] = [];
        if (!countdownState[k]) countdownState[k] = { remaining: 0, lastPoll: 0 };
      });
    }

    // ------------------------------------------------------------------
    // Status polling
    // ------------------------------------------------------------------

    async function pollAll() {
      if (!instances.length) {
        document.getElementById('instances').innerHTML =
          '<p class="offline-banner">No vivid_dryer instances found.<br>Check your printer.cfg and Klipper logs.</p>';
        return;
      }

      const query = instances.map(k => encodeURIComponent(k)).join('&');
      let data;
      try {
        data = await apiGet('/printer/objects/query?' + query);
      } catch (e) {
        renderOffline();
        return;
      }

      const status = data.result.status;
      const now = Date.now() / 1000;

      instances.forEach(key => {
        const s = status[key] || {};

        // Update sparkline data
        if (s.mode === 'humidity' && s.current_humidity > 0) {
          const arr = sparkData[key];
          arr.push({ t: now, h: s.current_humidity });
          if (arr.length > 30) arr.shift();
        }

        // Update countdown state
        if (s.active && s.mode === 'timed') {
          countdownState[key] = {
            remaining: s.remaining_seconds,
            totalSecs: s.total_seconds || 0,
            lastPoll: now,
          };
        } else if (!s.active || s.mode !== 'timed') {
          countdownState[key] = { remaining: 0, totalSecs: 0, lastPoll: now };
        }

        renderCard(key, s);
      });
    }

    function renderOffline() {
      document.getElementById('instances').innerHTML =
        '<p class="offline-banner">&#x26A0;&#xFE0F; Moonraker offline</p>';
    }

    // ------------------------------------------------------------------
    // Card rendering
    // ------------------------------------------------------------------

    function instanceLabel(key) {
      if (key === 'vivid_dryer') return 'Dryer';
      return key.replace(/^vivid_dryer\s+/i, '');
    }

    function cmdSuffix(key) {
      if (key === 'vivid_dryer') return '';
      const name = key.replace(/^vivid_dryer\s+/i, '');
      return '_' + name.toUpperCase().replace(/\s+/g, '_');
    }

    function fmt1(v) { return (v == null ? '—' : (+v).toFixed(1)); }
    function fmt0(v) { return (v == null ? '—' : Math.round(+v).toString()); }

    function fmtCountdown(secs) {
      if (secs <= 0) return '00:00:00';
      const h = Math.floor(secs / 3600);
      const m = Math.floor((secs % 3600) / 60);
      const s = Math.floor(secs % 60);
      return String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
    }

    function renderCard(key, s) {
      const container = document.getElementById('instances');
      const cardId = 'card-' + key.replace(/\s+/g, '_');
      let card = document.getElementById(cardId);
      if (!card) {
        card = document.createElement('div');
        card.className = 'card';
        card.id = cardId;
        container.appendChild(card);
      }

      const mode = s.mode || 'idle';
      const active = !!s.active;
      const suffix = cmdSuffix(key);
      const label = instanceLabel(key);

      // Badge
      let badgeClass, badgeText;
      if (!active)            { badgeClass = 'badge-idle';     badgeText = 'IDLE'; }
      else if (mode === 'timed')   { badgeClass = 'badge-timed';    badgeText = 'TIMED'; }
      else if (mode === 'humidity') { badgeClass = 'badge-humidity'; badgeText = 'HUMIDITY'; }
      else                    { badgeClass = 'badge-idle';     badgeText = 'IDLE'; }

      // Countdown (client-side ticking)
      let displayRemaining = 0;
      if (active && mode === 'timed') {
        const cs = countdownState[key];
        const elapsed = Date.now() / 1000 - cs.lastPoll;
        displayRemaining = Math.max(0, cs.remaining - elapsed);
      }

      // Progress bar
      let progressHtml = '';
      if (active && mode === 'timed') {
        const totalSecs = s.total_seconds || 0;
        const pct = totalSecs > 0
          ? Math.max(0, Math.min(100, (1 - displayRemaining / totalSecs) * 100))
          : 0;
        progressHtml = `
          <div class="progress-wrap">
            <div class="progress-label">
              <span>Progress</span>
              <span>${fmtCountdown(displayRemaining)} remaining</span>
            </div>
            <div class="progress-bar-bg">
              <div class="progress-bar-fill" id="pbar-${cardId}" style="width:${pct.toFixed(1)}%"></div>
            </div>
          </div>`;
      }

      // Sparkline
      let sparkHtml = '';
      if (active && mode === 'humidity' && sparkData[key].length >= 2) {
        sparkHtml = `
          <div class="sparkline-wrap">
            <div class="sparkline-label">Humidity trend (last ${sparkData[key].length} readings)</div>
            ${buildSparklineSVG(sparkData[key], s.target_humidity)}
          </div>`;
      }

      // Heater temp color
      const hTemp = s.heater_temp || 0;
      const hTarget = s.heater_target || 0;
      const hClass = hTemp > 50 ? 'hot' : hTemp > 30 ? 'ok' : 'cool';

      card.innerHTML = `
        <div class="card-header">
          <span class="card-title">&#x1F321;&#xFE0F; ${escHtml(label)}</span>
          <span class="badge ${badgeClass}">${badgeText}</span>
        </div>

        <div class="stat-grid">
          <div class="stat-item">
            <label>Heater temp</label>
            <span class="val ${hClass}">${fmt1(hTemp)} °C</span>
          </div>
          <div class="stat-item">
            <label>Heater target</label>
            <span class="val">${fmt1(hTarget)} °C</span>
          </div>
          <div class="stat-item">
            <label>PTC ambient</label>
            <span class="val">${fmt1(s.ambient_temp)} °C</span>
          </div>
          <div class="stat-item">
            <label>Humidity avg</label>
            <span class="val ok">${fmt0(s.current_humidity)} %</span>
          </div>
          <div class="stat-item">
            <label>Humidity left</label>
            <span class="val">${fmt0(s.current_humidity_left)} %</span>
          </div>
          <div class="stat-item">
            <label>Humidity right</label>
            <span class="val">${fmt0(s.current_humidity_right)} %</span>
          </div>
          ${mode === 'humidity' ? `
          <div class="stat-item">
            <label>Target RH</label>
            <span class="val">${fmt0(s.target_humidity)} %</span>
          </div>
          <div class="stat-item">
            <label>Temp range</label>
            <span class="val">${fmt1(s.temp_min)}–${fmt1(s.temp_max)} °C</span>
          </div>` : ''}
          ${mode === 'timed' ? `
          <div class="stat-item">
            <label>Set temp</label>
            <span class="val">${fmt1(s.target_temp)} °C</span>
          </div>
          <div class="stat-item">
            <label>Countdown</label>
            <span class="val" id="cd-${cardId}">${fmtCountdown(displayRemaining)}</span>
          </div>` : ''}
        </div>

        ${progressHtml}
        ${sparkHtml}

        <hr class="divider" />
        <div class="controls">
          <div class="section-label">Timed mode</div>
          <div class="form-row">
            <div class="form-field">
              <label>Temp °C</label>
              <input type="number" id="t-temp-${cardId}" value="55" min="20" max="75" step="1" />
            </div>
            <div class="form-field">
              <label>Hours</label>
              <input type="number" id="t-hours-${cardId}" value="4" min="0" step="1" />
            </div>
            <div class="form-field">
              <label>Min</label>
              <input type="number" id="t-min-${cardId}" value="0" min="0" max="59" step="1" />
            </div>
            <div class="form-field">
              <label>Sec</label>
              <input type="number" id="t-sec-${cardId}" value="0" min="0" max="59" step="1" />
            </div>
          </div>
          <div class="btn-row">
            <button class="btn-timed" onclick="startTimed(${JSON.stringify(key)}, ${JSON.stringify(cardId)}, ${JSON.stringify(suffix)})">&#x25B6; Start Timed</button>
          </div>

          <div class="section-label">Humidity-hold mode</div>
          <div class="form-row">
            <div class="form-field">
              <label>Target %RH</label>
              <input type="number" id="h-rh-${cardId}" value="30" min="1" max="99" step="1" />
            </div>
            <div class="form-field">
              <label>Temp max °C</label>
              <input type="number" id="h-tmax-${cardId}" value="55" min="20" max="75" step="1" />
            </div>
            <div class="form-field">
              <label>Temp min °C</label>
              <input type="number" id="h-tmin-${cardId}" value="35" min="20" max="75" step="1" />
            </div>
            <div class="form-field">
              <label>Max hrs</label>
              <input type="number" id="h-mh-${cardId}" value="0" min="0" step="1" title="0 = no timeout" />
            </div>
          </div>
          <div class="btn-row">
            <button class="btn-humid" onclick="startHumidity(${JSON.stringify(key)}, ${JSON.stringify(cardId)}, ${JSON.stringify(suffix)})">&#x1F4A7; Start Humidity</button>
            <button class="btn-stop"  onclick="stopCycle(${JSON.stringify(suffix)})">&#x25A0; Stop</button>
          </div>
        </div>`;
    }

    // ------------------------------------------------------------------
    // Sparkline SVG
    // ------------------------------------------------------------------

    function buildSparklineSVG(data, targetRH) {
      const W = 300, H = 60, PAD = 4;
      const hvals = data.map(d => d.h);
      let lo = Math.min(...hvals) - 2;
      let hi = Math.max(...hvals) + 2;
      if (targetRH != null) {
        lo = Math.min(lo, targetRH - 2);
        hi = Math.max(hi, targetRH + 2);
      }
      if (hi <= lo) hi = lo + 1;

      const scaleX = (i) => PAD + (i / (data.length - 1)) * (W - 2 * PAD);
      const scaleY = (v) => H - PAD - ((v - lo) / (hi - lo)) * (H - 2 * PAD);

      const pts = data.map((d, i) => scaleX(i) + ',' + scaleY(d.h));
      const area = pts.join(' L ') + ` L ${scaleX(data.length-1)},${H-PAD} L ${scaleX(0)},${H-PAD} Z`;
      const line = 'M ' + pts.join(' L ');

      let targetLine = '';
      if (targetRH != null) {
        const ty = scaleY(targetRH).toFixed(1);
        targetLine = `<line x1="${PAD}" y1="${ty}" x2="${W-PAD}" y2="${ty}" stroke="#66bb6a" stroke-width="1" stroke-dasharray="4,3" opacity="0.7"/>`;
      }

      return `<svg class="sparkline" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
  <defs>
    <linearGradient id="sg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4fc3f7" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#4fc3f7" stop-opacity="0.05"/>
    </linearGradient>
  </defs>
  ${targetLine}
  <path d="M ${area}" fill="url(#sg)" />
  <path d="${line}" fill="none" stroke="#4fc3f7" stroke-width="1.5" stroke-linejoin="round"/>
</svg>`;
    }

    // ------------------------------------------------------------------
    // Client-side countdown tick
    // ------------------------------------------------------------------

    function tickCountdowns() {
      const now = Date.now() / 1000;
      instances.forEach(key => {
        const cs = countdownState[key];
        if (!cs || cs.remaining <= 0) return;
        const cardId = 'card-' + key.replace(/\s+/g, '_');
        const el = document.getElementById('cd-' + cardId);
        if (!el) return;
        const elapsed = now - cs.lastPoll;
        const rem = Math.max(0, cs.remaining - elapsed);
        el.textContent = fmtCountdown(rem);
        // Update progress bar using total cycle duration from server
        const pbar = document.getElementById('pbar-' + cardId);
        if (pbar && cs.totalSecs > 0) {
          const pct = Math.min(100, ((cs.totalSecs - rem) / cs.totalSecs) * 100);
          pbar.style.width = pct.toFixed(1) + '%';
        }
      });
    }

    // ------------------------------------------------------------------
    // GCode actions
    // ------------------------------------------------------------------

    async function startTimed(key, cardId, suffix) {
      const temp  = parseFloat(document.getElementById('t-temp-'  + cardId).value) || 55;
      const hours = parseFloat(document.getElementById('t-hours-' + cardId).value) || 0;
      const min   = parseFloat(document.getElementById('t-min-'   + cardId).value) || 0;
      const sec   = parseFloat(document.getElementById('t-sec-'   + cardId).value) || 0;
      const cmd = `VIVID_DRY_START${suffix} TEMP=${temp} HOURS=${hours} MINUTES=${min} SECONDS=${sec}`;
      try {
        await sendGCode(cmd);
        showToast('Timed cycle started', true);
        setTimeout(pollAll, 800);
      } catch (e) {
        showToast('Error: ' + e.message, false);
      }
    }

    async function startHumidity(key, cardId, suffix) {
      const rh   = parseFloat(document.getElementById('h-rh-'   + cardId).value) || 30;
      const tmax = parseFloat(document.getElementById('h-tmax-' + cardId).value) || 55;
      const tmin = parseFloat(document.getElementById('h-tmin-' + cardId).value) || 35;
      const mh   = parseFloat(document.getElementById('h-mh-'   + cardId).value) || 0;
      let cmd = `VIVID_DRY_START${suffix} HUMIDITY=${rh} TEMP_MAX=${tmax} TEMP_MIN=${tmin}`;
      if (mh > 0) cmd += ` MAX_HOURS=${mh}`;
      try {
        await sendGCode(cmd);
        showToast('Humidity-hold mode started', true);
        setTimeout(pollAll, 800);
      } catch (e) {
        showToast('Error: ' + e.message, false);
      }
    }

    async function stopCycle(suffix) {
      try {
        await sendGCode('VIVID_DRY_STOP' + suffix);
        showToast('Cycle stopped', true);
        setTimeout(pollAll, 800);
      } catch (e) {
        showToast('Error: ' + e.message, false);
      }
    }

    // ------------------------------------------------------------------
    // Toast
    // ------------------------------------------------------------------

    let toastTimer = null;
    function showToast(msg, ok) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.className = 'show' + (ok ? '' : ' err');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => { el.className = ''; }, 3000);
    }

    // ------------------------------------------------------------------
    // Utility
    // ------------------------------------------------------------------

    function escHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    // ------------------------------------------------------------------
    // Init
    // ------------------------------------------------------------------

    async function init() {
      try {
        await discoverInstances();
      } catch (e) {
        renderOffline();
      }
      await pollAll();
      setInterval(pollAll, POLL_MS);
      tickTimer = setInterval(tickCountdowns, 1000);
    }

    init();
  </script>
</body>
</html>
