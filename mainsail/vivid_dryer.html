<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ViViD Dryer Control</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Roboto', 'Segoe UI', sans-serif;
      background: #121212;
      color: #e0e0e0;
      min-height: 100vh;
      padding: 16px;
    }

    h1 {
      font-size: 1.3rem;
      font-weight: 600;
      color: #fff;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* ------------------------------------------------------------------ */
    /* Cards                                                               */
    /* ------------------------------------------------------------------ */
    .card {
      background: #1e1e1e;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 16px;
      border: 1px solid #2c2c2c;
    }
    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
      flex-wrap: wrap;
      gap: 8px;
    }
    .card-title {
      font-size: 1rem;
      font-weight: 600;
      color: #fff;
    }

    /* ------------------------------------------------------------------ */
    /* Mode badge                                                          */
    /* ------------------------------------------------------------------ */
    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .badge-idle     { background: #424242; color: #9e9e9e; }
    .badge-timed    { background: #1565c0; color: #90caf9; }
    .badge-humidity { background: #1b5e20; color: #a5d6a7; }

    /* ------------------------------------------------------------------ */
    /* Stats grid                                                          */
    /* ------------------------------------------------------------------ */
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
      gap: 10px;
      margin-bottom: 14px;
    }
    .stat {
      background: #272727;
      border-radius: 6px;
      padding: 8px 10px;
    }
    .stat-label {
      font-size: 0.65rem;
      color: #9e9e9e;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 4px;
    }
    .stat-value {
      font-size: 1.1rem;
      font-weight: 700;
      color: #fff;
    }
    .stat-value.accent { color: #2196f3; }
    .stat-value.green  { color: #66bb6a; }
    .stat-value.large  { font-size: 1.5rem; }

    /* ------------------------------------------------------------------ */
    /* Progress bar                                                        */
    /* ------------------------------------------------------------------ */
    .progress-wrap {
      background: #272727;
      border-radius: 4px;
      height: 6px;
      margin-bottom: 14px;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      background: #2196f3;
      border-radius: 4px;
      transition: width 1s linear;
    }

    /* ------------------------------------------------------------------ */
    /* Sparkline                                                           */
    /* ------------------------------------------------------------------ */
    .sparkline-wrap {
      margin-bottom: 14px;
    }
    .sparkline-label {
      font-size: 0.65rem;
      color: #9e9e9e;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 4px;
    }
    canvas.sparkline {
      width: 100%;
      height: 60px;
      display: block;
      border-radius: 4px;
      background: #272727;
    }

    /* ------------------------------------------------------------------ */
    /* Controls                                                            */
    /* ------------------------------------------------------------------ */
    .controls { display: flex; flex-direction: column; gap: 12px; }

    .control-section {
      background: #272727;
      border-radius: 6px;
      padding: 10px 12px;
    }
    .control-section h3 {
      font-size: 0.72rem;
      color: #9e9e9e;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 8px;
    }

    .input-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: flex-end;
      margin-bottom: 8px;
    }
    .input-group {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .input-group label {
      font-size: 0.65rem;
      color: #9e9e9e;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .input-group input {
      background: #1a1a1a;
      border: 1px solid #3a3a3a;
      border-radius: 4px;
      color: #e0e0e0;
      font-size: 0.85rem;
      padding: 4px 8px;
      width: 70px;
    }
    .input-group input:focus {
      outline: none;
      border-color: #2196f3;
    }

    /* ------------------------------------------------------------------ */
    /* Buttons                                                             */
    /* ------------------------------------------------------------------ */
    .btn {
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 600;
      padding: 6px 14px;
      transition: opacity 0.15s;
    }
    .btn:hover   { opacity: 0.85; }
    .btn:active  { opacity: 0.7; }
    .btn:disabled { opacity: 0.4; cursor: default; }

    .btn-primary { background: #2196f3; color: #fff; }
    .btn-green   { background: #388e3c; color: #fff; }
    .btn-stop    { background: #c62828; color: #fff; }

    /* ------------------------------------------------------------------ */
    /* Error / offline banner                                              */
    /* ------------------------------------------------------------------ */
    .banner {
      background: #311;
      border: 1px solid #7b1e1e;
      border-radius: 6px;
      color: #ef9a9a;
      font-size: 0.8rem;
      padding: 8px 12px;
      margin-bottom: 12px;
      display: none;
    }
    .banner.visible { display: block; }

    /* ------------------------------------------------------------------ */
    /* Countdown                                                           */
    /* ------------------------------------------------------------------ */
    .countdown {
      font-size: 1.8rem;
      font-weight: 700;
      color: #2196f3;
      letter-spacing: 0.05em;
      font-variant-numeric: tabular-nums;
    }

    /* ------------------------------------------------------------------ */
    /* Loading / empty                                                     */
    /* ------------------------------------------------------------------ */
    #loading { color: #9e9e9e; font-size: 0.9rem; padding: 20px 0; }
  </style>
</head>
<body>
  <h1>
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#2196f3" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 2a10 10 0 1 0 0 20A10 10 0 0 0 12 2z"/>
      <path d="M12 6v6l4 2"/>
    </svg>
    ViViD Dryer Control
  </h1>

  <div id="banner" class="banner"></div>
  <div id="loading">Discovering dryer instances&hellip;</div>
  <div id="cards"></div>

  <script>
  (function () {
    'use strict';

    // Moonraker base URL — tries window.location.origin, falls back to localhost
    const BASE = (function () {
      const o = window.location.origin;
      return (o && o !== 'null' && !o.startsWith('file')) ? o : 'http://localhost:7125';
    })();

    const POLL_INTERVAL_MS = 5000;

    // ------------------------------------------------------------------ //
    // State per instance                                                  //
    // ------------------------------------------------------------------ //
    const instances = {};   // key → { name, cardEl, sparkData, countdownInterval, totalSeconds }

    // ------------------------------------------------------------------ //
    // Utility                                                             //
    // ------------------------------------------------------------------ //
    function fmt2(n) { return String(Math.floor(n)).padStart(2, '0'); }

    function formatSeconds(s) {
      const h = Math.floor(s / 3600);
      const m = Math.floor((s % 3600) / 60);
      const sec = s % 60;
      return fmt2(h) + ':' + fmt2(m) + ':' + fmt2(sec);
    }

    function apiPost(endpoint, body) {
      return fetch(BASE + endpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
    }

    function runGcode(script) {
      return apiPost('/printer/gcode/script', { script });
    }

    // ------------------------------------------------------------------ //
    // Sparkline drawing                                                   //
    // ------------------------------------------------------------------ //
    function drawSparkline(canvas, data) {
      const W = canvas.offsetWidth || 300;
      const H = canvas.offsetHeight || 60;
      canvas.width  = W * window.devicePixelRatio;
      canvas.height = H * window.devicePixelRatio;
      const ctx = canvas.getContext('2d');
      ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
      ctx.clearRect(0, 0, W, H);

      if (data.length < 2) return;
      const min = Math.max(0,  Math.min(...data) - 5);
      const max = Math.min(100, Math.max(...data) + 5);
      const range = max - min || 1;

      const pts = data.map((v, i) => ({
        x: (i / (data.length - 1)) * W,
        y: H - ((v - min) / range) * (H - 8) - 4,
      }));

      // Filled area
      ctx.beginPath();
      ctx.moveTo(pts[0].x, H);
      pts.forEach(p => ctx.lineTo(p.x, p.y));
      ctx.lineTo(pts[pts.length - 1].x, H);
      ctx.closePath();
      ctx.fillStyle = 'rgba(76,175,80,0.15)';
      ctx.fill();

      // Line
      ctx.beginPath();
      pts.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
      ctx.strokeStyle = '#66bb6a';
      ctx.lineWidth = 1.5;
      ctx.stroke();
    }

    // ------------------------------------------------------------------ //
    // Card creation                                                       //
    // ------------------------------------------------------------------ //
    function createCard(instanceKey, instanceName) {
      const card = document.createElement('div');
      card.className = 'card';
      card.dataset.key = instanceKey;

      card.innerHTML = `
        <div class="card-header">
          <span class="card-title">ViViD Dryer &mdash; ${instanceName || instanceKey}</span>
          <span class="badge badge-idle" id="badge-${instanceKey}">IDLE</span>
        </div>

        <div class="stats" id="stats-${instanceKey}">
          <div class="stat">
            <div class="stat-label">Heater</div>
            <div class="stat-value accent" id="temp-current-${instanceKey}">--</div>
          </div>
          <div class="stat">
            <div class="stat-label">Target</div>
            <div class="stat-value" id="temp-target-${instanceKey}">--</div>
          </div>
          <div class="stat">
            <div class="stat-label">Humidity Avg</div>
            <div class="stat-value green large" id="hum-avg-${instanceKey}">--%</div>
          </div>
          <div class="stat">
            <div class="stat-label">Left RH%</div>
            <div class="stat-value" id="hum-left-${instanceKey}">--%</div>
          </div>
          <div class="stat">
            <div class="stat-label">Right RH%</div>
            <div class="stat-value" id="hum-right-${instanceKey}">--%</div>
          </div>
          <div class="stat">
            <div class="stat-label">PTC Ambient</div>
            <div class="stat-value" id="ptc-temp-${instanceKey}">--</div>
          </div>
        </div>

        <div id="countdown-wrap-${instanceKey}" style="margin-bottom:14px;display:none;">
          <div class="stat-label" style="font-size:0.65rem;color:#9e9e9e;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;">Time Remaining</div>
          <div class="countdown" id="countdown-${instanceKey}">00:00:00</div>
          <div class="progress-wrap" id="progress-wrap-${instanceKey}" style="margin-top:8px;display:none;">
            <div class="progress-bar" id="progress-bar-${instanceKey}" style="width:0%"></div>
          </div>
        </div>

        <div class="sparkline-wrap" id="sparkline-wrap-${instanceKey}" style="display:none;">
          <div class="sparkline-label">Humidity history (last 30 readings)</div>
          <canvas class="sparkline" id="sparkline-${instanceKey}"></canvas>
        </div>

        <div class="controls">
          <div class="control-section">
            <h3>Timed Mode</h3>
            <div class="input-row">
              <div class="input-group">
                <label>Temp (&deg;C)</label>
                <input type="number" id="timed-temp-${instanceKey}" value="55" min="1" max="75" step="1" />
              </div>
              <div class="input-group">
                <label>Hours</label>
                <input type="number" id="timed-hours-${instanceKey}" value="4" min="0" step="1" />
              </div>
              <div class="input-group">
                <label>Minutes</label>
                <input type="number" id="timed-min-${instanceKey}" value="0" min="0" max="59" step="1" />
              </div>
            </div>
            <button class="btn btn-primary" id="btn-timed-${instanceKey}">Start Timed Dry</button>
          </div>

          <div class="control-section">
            <h3>Humidity Hold Mode</h3>
            <div class="input-row">
              <div class="input-group">
                <label>Target RH%</label>
                <input type="number" id="hum-target-${instanceKey}" value="30" min="0" max="100" step="1" />
              </div>
              <div class="input-group">
                <label>Max Temp</label>
                <input type="number" id="hum-max-temp-${instanceKey}" value="55" min="1" max="75" step="1" />
              </div>
              <div class="input-group">
                <label>Min Temp</label>
                <input type="number" id="hum-min-temp-${instanceKey}" value="35" min="1" max="75" step="1" />
              </div>
              <div class="input-group">
                <label>Max Hours (0=&infin;)</label>
                <input type="number" id="hum-max-hours-${instanceKey}" value="0" min="0" step="1" />
              </div>
            </div>
            <button class="btn btn-green" id="btn-hum-${instanceKey}">Start Humidity Hold</button>
          </div>

          <button class="btn btn-stop" id="btn-stop-${instanceKey}" style="display:none;">Stop Dryer</button>
        </div>
      `;

      instances[instanceKey] = {
        name: instanceName,
        cardEl: card,
        sparkData: [],
        countdownInterval: null,
        totalSeconds: 0,
        remainingSeconds: 0,
      };

      // Wire up buttons
      const suffix = instanceName ? '_' + instanceName.toUpperCase() : '';

      card.querySelector('#btn-timed-' + instanceKey).addEventListener('click', () => {
        const temp  = parseFloat(card.querySelector('#timed-temp-'  + instanceKey).value) || 55;
        const hours = parseFloat(card.querySelector('#timed-hours-' + instanceKey).value) || 0;
        const mins  = parseFloat(card.querySelector('#timed-min-'   + instanceKey).value) || 0;
        runGcode('VIVID_DRY_START' + suffix + ' TEMP=' + temp + ' HOURS=' + hours + ' MINUTES=' + mins)
          .catch(err => showBanner('GCode error: ' + err.message));
      });

      card.querySelector('#btn-hum-' + instanceKey).addEventListener('click', () => {
        const target   = parseFloat(card.querySelector('#hum-target-'    + instanceKey).value) || 30;
        const maxTemp  = parseFloat(card.querySelector('#hum-max-temp-'  + instanceKey).value) || 55;
        const minTemp  = parseFloat(card.querySelector('#hum-min-temp-'  + instanceKey).value) || 35;
        const maxHours = parseFloat(card.querySelector('#hum-max-hours-' + instanceKey).value) || 0;
        let script = 'VIVID_DRY_START' + suffix +
          ' HUMIDITY=' + target + ' TEMP_MAX=' + maxTemp + ' TEMP_MIN=' + minTemp;
        if (maxHours > 0) script += ' MAX_HOURS=' + maxHours;
        runGcode(script).catch(err => showBanner('GCode error: ' + err.message));
      });

      card.querySelector('#btn-stop-' + instanceKey).addEventListener('click', () => {
        runGcode('VIVID_DRY_STOP' + suffix)
          .catch(err => showBanner('GCode error: ' + err.message));
      });

      return card;
    }

    // ------------------------------------------------------------------ //
    // Status update for one card                                          //
    // ------------------------------------------------------------------ //
    function updateCard(instanceKey, st, printerObjects) {
      const inst = instances[instanceKey];
      if (!inst) return;

      const card = inst.cardEl;
      const badge        = card.querySelector('#badge-'         + instanceKey);
      const tempCurrent  = card.querySelector('#temp-current-'  + instanceKey);
      const tempTarget   = card.querySelector('#temp-target-'   + instanceKey);
      const humAvg       = card.querySelector('#hum-avg-'       + instanceKey);
      const humLeft      = card.querySelector('#hum-left-'      + instanceKey);
      const humRight     = card.querySelector('#hum-right-'     + instanceKey);
      const ptcTemp      = card.querySelector('#ptc-temp-'      + instanceKey);
      const countdownWrap = card.querySelector('#countdown-wrap-' + instanceKey);
      const countdown    = card.querySelector('#countdown-'     + instanceKey);
      const progressWrap = card.querySelector('#progress-wrap-' + instanceKey);
      const progressBar  = card.querySelector('#progress-bar-'  + instanceKey);
      const sparkWrap    = card.querySelector('#sparkline-wrap-' + instanceKey);
      const sparkCanvas  = card.querySelector('#sparkline-'     + instanceKey);
      const btnStop      = card.querySelector('#btn-stop-'      + instanceKey);

      // Mode badge
      badge.className = 'badge';
      if (st.mode === 'timed') {
        badge.classList.add('badge-timed');
        badge.textContent = 'TIMED';
      } else if (st.mode === 'humidity') {
        badge.classList.add('badge-humidity');
        badge.textContent = 'HUMIDITY';
      } else {
        badge.classList.add('badge-idle');
        badge.textContent = 'IDLE';
      }

      // Heater temp — look up via heater_generic object
      const instanceName = inst.name || '';
      const heaterKey = 'heater_generic ' + (instanceName ? instanceName + '_dryer' : 'Vivid_1_dryer');
      const heaterSt  = printerObjects[heaterKey] || {};
      const currC = typeof heaterSt.temperature !== 'undefined'
        ? heaterSt.temperature.toFixed(1) + ' C' : '--';
      tempCurrent.textContent = currC;
      tempTarget.textContent  = st.active ? st.target_temp.toFixed(1) + ' C' : 'Off';

      // Humidity
      const hAvg = typeof st.current_humidity !== 'undefined' ? st.current_humidity : null;
      const hL   = typeof st.current_humidity_left  !== 'undefined' ? st.current_humidity_left  : null;
      const hR   = typeof st.current_humidity_right !== 'undefined' ? st.current_humidity_right : null;
      humAvg.textContent   = hAvg !== null ? hAvg.toFixed(1)  + '%' : '--%';
      humLeft.textContent  = hL   !== null ? hL.toFixed(1)    + '%' : '--%';
      humRight.textContent = hR   !== null ? hR.toFixed(1)    + '%' : '--%';

      // PTC ambient temp
      const ptcKey = 'temperature_sensor ' + (instanceName || 'Vivid_1') + '_PTC_temp';
      const ptcSt  = printerObjects[ptcKey] || {};
      ptcTemp.textContent = typeof ptcSt.temperature !== 'undefined'
        ? ptcSt.temperature.toFixed(1) + ' C' : '--';

      // Sparkline in humidity mode
      if (st.mode === 'humidity' && hAvg !== null) {
        inst.sparkData.push(hAvg);
        if (inst.sparkData.length > 30) inst.sparkData.shift();
        sparkWrap.style.display = 'block';
        drawSparkline(sparkCanvas, inst.sparkData);
      } else if (!st.active) {
        sparkWrap.style.display = 'none';
      }

      // Countdown + progress bar (timed mode)
      if (inst.countdownInterval) {
        clearInterval(inst.countdownInterval);
        inst.countdownInterval = null;
      }

      if (st.active && st.remaining_seconds > 0) {
        countdownWrap.style.display = 'block';
        let rem = st.remaining_seconds;
        countdown.textContent = formatSeconds(rem);

        if (st.mode === 'timed') {
          // derive total from temp + duration stored on start, but we don't have it;
          // use remaining vs. a stored total (reset when remaining grows)
          if (rem > inst.remainingSeconds || inst.totalSeconds === 0) {
            inst.totalSeconds = rem;
          }
          progressWrap.style.display = 'block';
          const pct = inst.totalSeconds > 0
            ? Math.max(0, Math.min(100, (1 - rem / inst.totalSeconds) * 100))
            : 0;
          progressBar.style.width = pct.toFixed(1) + '%';
        } else {
          progressWrap.style.display = 'none';
        }

        inst.remainingSeconds = rem;
        inst.countdownInterval = setInterval(() => {
          rem = Math.max(0, rem - 1);
          countdown.textContent = formatSeconds(rem);
          if (st.mode === 'timed' && inst.totalSeconds > 0) {
            const p = (1 - rem / inst.totalSeconds) * 100;
            progressBar.style.width = Math.max(0, Math.min(100, p)).toFixed(1) + '%';
          }
          if (rem <= 0) {
            clearInterval(inst.countdownInterval);
            inst.countdownInterval = null;
          }
        }, 1000);
      } else if (st.active && st.mode === 'humidity' && st.remaining_seconds === 0) {
        // Humidity mode with no timeout — show infinity symbol
        countdownWrap.style.display = 'block';
        countdown.textContent = '\u221e'; // infinity symbol
        progressWrap.style.display = 'none';
        inst.remainingSeconds = 0;
      } else {
        countdownWrap.style.display = 'none';
        inst.remainingSeconds = 0;
      }

      // Stop button visibility
      btnStop.style.display = st.active ? 'inline-block' : 'none';
    }

    // ------------------------------------------------------------------ //
    // Banner                                                              //
    // ------------------------------------------------------------------ //
    function showBanner(msg) {
      const el = document.getElementById('banner');
      el.textContent = msg;
      el.classList.add('visible');
      setTimeout(() => el.classList.remove('visible'), 8000);
    }

    function hideBanner() {
      document.getElementById('banner').classList.remove('visible');
    }

    // ------------------------------------------------------------------ //
    // Discover instances                                                  //
    // ------------------------------------------------------------------ //
    async function discoverInstances() {
      const res = await fetch(BASE + '/printer/objects/list');
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      const keys = (data.result && data.result.objects) ? data.result.objects : [];
      const vividKeys = keys.filter(k => k === 'vivid_dryer' || k.startsWith('vivid_dryer '));
      return vividKeys;
    }

    // ------------------------------------------------------------------ //
    // Poll all instances                                                  //
    // ------------------------------------------------------------------ //
    async function pollStatus() {
      try {
        const keys = Object.keys(instances);
        if (keys.length === 0) return;

        // Build query for all vivid_dryer instances + heater/sensor objects
        const queryParts = keys.map(k => encodeURIComponent(k)).join('&objects[]=');
        const url = BASE + '/printer/objects/query?objects[]=' + queryParts +
          '&objects[]=heaters&objects[]=configfile';

        // Also query all heater_generic and temperature_sensor objects we need
        const extraKeys = [];
        keys.forEach(k => {
          const inst = instances[k];
          const name = inst.name || 'Vivid_1';
          extraKeys.push('heater_generic ' + name + '_dryer');
          extraKeys.push('temperature_sensor ' + name + '_PTC_temp');
        });
        const fullUrl = url + '&objects[]=' + extraKeys.map(k => encodeURIComponent(k)).join('&objects[]=');

        const res = await fetch(fullUrl);
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();
        const status = (data.result && data.result.status) ? data.result.status : {};

        hideBanner();
        keys.forEach(k => {
          const st = status[k] || {};
          updateCard(k, st, status);
        });
      } catch (err) {
        showBanner('Moonraker offline or unreachable: ' + err.message);
      }
    }

    // ------------------------------------------------------------------ //
    // Init                                                                //
    // ------------------------------------------------------------------ //
    async function init() {
      try {
        const keys = await discoverInstances();
        document.getElementById('loading').style.display = 'none';

        if (keys.length === 0) {
          document.getElementById('cards').innerHTML =
            '<p style="color:#9e9e9e;font-size:.9rem;">No [vivid_dryer] instances found in printer config.</p>';
          return;
        }

        const container = document.getElementById('cards');
        keys.forEach(k => {
          const parts = k.split(' ');
          const instanceName = parts.length > 1 ? parts.slice(1).join(' ') : '';
          const card = createCard(k, instanceName);
          container.appendChild(card);
        });

        await pollStatus();
        setInterval(pollStatus, POLL_INTERVAL_MS);
      } catch (err) {
        document.getElementById('loading').style.display = 'none';
        showBanner('Failed to connect to Moonraker at ' + BASE + ': ' + err.message);
        document.getElementById('cards').innerHTML =
          '<p style="color:#9e9e9e;font-size:.9rem;">Could not load dryer status. Is Moonraker running?</p>';
      }
    }

    init();
