<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ViViD Dryer Control</title>
  <style>
    /* ------------------------------------------------------------------ */
    /* Base / reset                                                         */
    /* ------------------------------------------------------------------ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Roboto', 'Segoe UI', sans-serif;
      background: #121212;
      color: #e0e0e0;
      min-height: 100vh;
      padding: 16px;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 600;
      color: #fff;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    h1 svg { flex-shrink: 0; }

    /* ------------------------------------------------------------------ */
    /* Cards                                                               */
    /* ------------------------------------------------------------------ */
    .card {
      background: #1e1e1e;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 16px;
      border: 1px solid #2c2c2c;
    }
    .card h2 {
      font-size: 0.85rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #9e9e9e;
      margin-bottom: 12px;
    }

    /* ------------------------------------------------------------------ */
    /* Status card                                                         */
    /* ------------------------------------------------------------------ */
    .status-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
    }
    .stat { display: flex; flex-direction: column; gap: 2px; }
    .stat-label { font-size: 0.72rem; color: #757575; text-transform: uppercase; letter-spacing: 0.06em; }
    .stat-value { font-size: 1.3rem; font-weight: 600; color: #fff; }
    .stat-unit  { font-size: 0.75rem; color: #9e9e9e; }

    /* mode badge */
    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.06em;
    }
    .badge-idle     { background: #2c2c2c; color: #9e9e9e; }
    .badge-timed    { background: #1a3a5c; color: #4fc3f7; }
    .badge-humidity { background: #1a3d2c; color: #66bb6a; }
    .badge-offline  { background: #3c1a1a; color: #ef9a9a; }

    /* ------------------------------------------------------------------ */
    /* Progress bar                                                        */
    /* ------------------------------------------------------------------ */
    .progress-wrap { margin-top: 12px; }
    .progress-label {
      display: flex; justify-content: space-between;
      font-size: 0.72rem; color: #757575; margin-bottom: 4px;
    }
    .progress-bar {
      height: 6px; background: #2c2c2c; border-radius: 3px; overflow: hidden;
    }
    .progress-fill {
      height: 100%; background: #4fc3f7; border-radius: 3px;
      transition: width 1s linear;
    }

    /* ------------------------------------------------------------------ */
    /* Humidity sparkline                                                  */
    /* ------------------------------------------------------------------ */
    #sparklineWrap { margin-top: 12px; }
    #sparklineWrap canvas {
      width: 100%;
      height: 70px;
      border-radius: 4px;
      background: #161616;
      display: block;
    }

    /* ------------------------------------------------------------------ */
    /* Forms                                                               */
    /* ------------------------------------------------------------------ */
    .form-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: flex-end;
      margin-bottom: 10px;
    }
    .form-group { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 80px; }
    .form-group label { font-size: 0.72rem; color: #9e9e9e; text-transform: uppercase; letter-spacing: 0.06em; }
    .form-group input {
      background: #2c2c2c;
      border: 1px solid #3c3c3c;
      border-radius: 4px;
      color: #e0e0e0;
      font-size: 0.9rem;
      padding: 7px 10px;
      width: 100%;
      outline: none;
      transition: border-color 0.15s;
    }
    .form-group input:focus { border-color: #4fc3f7; }

    /* ------------------------------------------------------------------ */
    /* Buttons                                                             */
    /* ------------------------------------------------------------------ */
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 9px 18px;
      border: none; border-radius: 4px;
      font-size: 0.85rem; font-weight: 600; cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn:active { transform: scale(0.97); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-primary  { background: #1976d2; color: #fff; }
    .btn-primary:hover:not(:disabled)  { background: #1565c0; }
    .btn-green    { background: #2e7d32; color: #fff; }
    .btn-green:hover:not(:disabled)    { background: #1b5e20; }
    .btn-danger   { background: #c62828; color: #fff; }
    .btn-danger:hover:not(:disabled)   { background: #b71c1c; }

    .btn-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 4px; }

    /* ------------------------------------------------------------------ */
    /* Toast                                                               */
    /* ------------------------------------------------------------------ */
    #toast {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: #323232; color: #e0e0e0;
      padding: 10px 20px; border-radius: 4px;
      font-size: 0.85rem; opacity: 0; pointer-events: none;
      transition: opacity 0.3s;
      z-index: 9999;
    }
    #toast.show { opacity: 1; }

    /* ------------------------------------------------------------------ */
    /* Responsive                                                          */
    /* ------------------------------------------------------------------ */
    @media (max-width: 480px) {
      .status-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

<h1>
  <!-- flame icon -->
  <svg width="24" height="24" viewBox="0 0 24 24" fill="#ff7043">
    <path d="M13.5 0.67s.74 2.65.74 4.8c0 2.06-1.35 3.73-3.41 3.73
             -2.07 0-3.63-1.67-3.63-3.73l.03-.36C5.21 7.51 4 10.62 4 14
             c0 4.42 3.58 8 8 8s8-3.58 8-8C20 8.61 17.41 3.8 13.5.67z
             M11.71 19c-1.78 0-3.22-1.4-3.22-3.14 0-1.62 1.05-2.76 2.81-3.12
             1.77-.36 3.6-1.21 4.62-2.58.39 1.29.59 2.65.59 4.04
             0 2.65-2.15 4.8-4.8 4.8z"/>
  </svg>
  ViViD Dryer Control
</h1>

<!-- -------------------------------------------------------------------- -->
<!-- Status card                                                           -->
<!-- -------------------------------------------------------------------- -->
<div class="card" id="statusCard">
  <h2>Status</h2>
  <div class="status-grid">
    <div class="stat">
      <span class="stat-label">Mode</span>
      <span id="modeBadge" class="badge badge-idle">IDLE</span>
    </div>
    <div class="stat">
      <span class="stat-label">Heater</span>
      <span class="stat-value" id="heaterTemp">—</span>
      <span class="stat-unit" id="heaterTarget"></span>
    </div>
    <div class="stat" id="humidStat" style="display:none;">
      <span class="stat-label">Humidity</span>
      <span class="stat-value" id="humidValue">—</span>
      <span class="stat-unit" id="humidTarget"></span>
    </div>
    <div class="stat">
      <span class="stat-label">Time Left</span>
      <span class="stat-value" id="timeLeft">—</span>
    </div>
  </div>

  <!-- progress bar — timed mode only -->
  <div class="progress-wrap" id="progressWrap" style="display:none;">
    <div class="progress-label">
      <span>Progress</span>
      <span id="progressPct">0%</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  </div>

  <!-- sparkline — humidity mode only -->
  <div id="sparklineWrap" style="display:none;">
    <canvas id="sparkline"></canvas>
  </div>

  <!-- stop button -->
  <div class="btn-row" id="stopRow" style="display:none; margin-top:14px;">
    <button class="btn btn-danger" onclick="sendStop()">⏹ Stop Dryer</button>
  </div>
</div>

<!-- -------------------------------------------------------------------- -->
<!-- Timed mode controls                                                   -->
<!-- -------------------------------------------------------------------- -->
<div class="card">
  <h2>Timed Dry Cycle</h2>
  <div class="form-row">
    <div class="form-group">
      <label>Temp (°C)</label>
      <input type="number" id="timedTemp" value="55" min="1" max="70" step="1" />
    </div>
    <div class="form-group">
      <label>Hours</label>
      <input type="number" id="timedHours" value="4" min="0" max="72" step="1" />
    </div>
    <div class="form-group">
      <label>Minutes</label>
      <input type="number" id="timedMinutes" value="0" min="0" max="59" step="1" />
    </div>
    <div class="form-group">
      <label>Seconds</label>
      <input type="number" id="timedSeconds" value="0" min="0" max="59" step="1" />
    </div>
  </div>
  <div class="btn-row">
    <button class="btn btn-primary" onclick="startTimed()">▶ Start Timed Dry</button>
  </div>
</div>

<!-- -------------------------------------------------------------------- -->
<!-- Humidity-hold mode controls                                           -->
<!-- -------------------------------------------------------------------- -->
<div class="card">
  <h2>Humidity-Hold Mode</h2>
  <div class="form-row">
    <div class="form-group">
      <label>Target Humidity (%)</label>
      <input type="number" id="humTarget" value="30" min="1" max="99" step="1" />
    </div>
    <div class="form-group">
      <label>Max Temp (°C)</label>
      <input type="number" id="humTempMax" value="55" min="1" max="70" step="1" />
    </div>
    <div class="form-group">
      <label>Min Temp (°C)</label>
      <input type="number" id="humTempMin" value="35" min="1" max="70" step="1" />
    </div>
    <div class="form-group">
      <label>Max Hours (0=∞)</label>
      <input type="number" id="humMaxHours" value="0" min="0" max="168" step="1" />
    </div>
  </div>
  <div class="btn-row">
    <button class="btn btn-green" onclick="startHumidity()">💧 Start Humidity Hold</button>
  </div>
</div>

<div id="toast"></div>

<script>
/* ========================================================================
   Configuration
   ======================================================================== */
  const BASE_URL = (() => {
  const origin = window.location.origin;
  // If served by Moonraker, use its origin; otherwise use localhost.
  if (origin && origin !== 'null' && !origin.startsWith('file:')) return origin;
  return 'http://localhost:7125';
})();

const POLL_INTERVAL_MS = 5000;

/* ========================================================================
   State
   ======================================================================== */
let state = {
  active: false,
  mode: 'idle',
  targetTemp: 0,
  currentHumidity: null,
  targetHumidity: null,
  remainingSeconds: 0,
  tempMin: 0,
  tempMax: 0,
};
let heaterActual = null;
let heaterTarget = null;
let countdownTimer = null;
let totalSeconds = 0;   // total duration for progress bar (timed mode)
let humidityHistory = []; // { t, v }[]

/* ========================================================================
   API helpers
   ======================================================================== */
async function apiGet(path) {
  const res = await fetch(BASE_URL + path, { cache: 'no-store' });
  if (!res.ok) throw new Error('HTTP ' + res.status);
  return res.json();
}

async function sendGcode(cmd) {
  const res = await fetch(BASE_URL + '/printer/gcode/script', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ script: cmd }),
  });
  if (!res.ok) throw new Error('HTTP ' + res.status);
}

/* ========================================================================
   Polling
   ======================================================================== */
async function poll() {
  try {
    const data = await apiGet(
      '/printer/objects/query?vivid_dryer&heater_generic+Vivid_1_dryer'
    );
    const vd = data?.result?.status?.vivid_dryer;
    const hg = data?.result?.status?.['heater_generic Vivid_1_dryer'];

    if (!vd) { showOffline(); return; }

    heaterActual = hg?.temperature ?? null;
    heaterTarget = hg?.target ?? null;

    const prevActive = state.active;
    state.active           = vd.active;
    state.mode             = vd.mode;
    state.targetTemp       = vd.target_temp;
    state.currentHumidity  = vd.current_humidity;
    state.targetHumidity   = vd.target_humidity;
    state.remainingSeconds = vd.remaining_seconds;
    state.tempMin          = vd.temp_min;
    state.tempMax          = vd.temp_max;

    // record total seconds when a timed cycle starts
    if (state.active && state.mode === 'timed' && !prevActive) {
      totalSeconds = state.remainingSeconds;
    }
    // reset when going idle
    if (!state.active) { totalSeconds = 0; stopCountdown(); }

    // feed sparkline
    if (state.currentHumidity !== null) {
      humidityHistory.push({ t: Date.now(), v: state.currentHumidity });
      if (humidityHistory.length > 30) humidityHistory.shift();
    }

    renderStatus();
    if (state.active && state.mode === 'timed') startCountdown(state.remainingSeconds);
  } catch (e) {
    showOffline();
  }
}

function showOffline() {
  document.getElementById('modeBadge').className = 'badge badge-offline';
  document.getElementById('modeBadge').textContent = 'OFFLINE';
  document.getElementById('heaterTemp').textContent = '—';
  document.getElementById('heaterTarget').textContent = '';
  document.getElementById('timeLeft').textContent = '—';
  document.getElementById('stopRow').style.display = 'none';
  document.getElementById('progressWrap').style.display = 'none';
  document.getElementById('sparklineWrap').style.display = 'none';
  document.getElementById('humidStat').style.display = 'none';
}

/* ========================================================================
   Render
   ======================================================================== */
function renderStatus() {
  const badge  = document.getElementById('modeBadge');
  const stopRow = document.getElementById('stopRow');

  // Mode badge
  badge.textContent = state.mode.toUpperCase();
  badge.className = 'badge badge-' + (state.mode === 'idle' ? 'idle'
                    : state.mode === 'timed' ? 'timed' : 'humidity');

  // Heater
  document.getElementById('heaterTemp').textContent =
    heaterActual !== null ? heaterActual.toFixed(1) + '°C' : '—';
  document.getElementById('heaterTarget').textContent =
    heaterTarget !== null && heaterTarget > 0
      ? 'target ' + heaterTarget.toFixed(1) + '°C' : '';

  // Humidity
  const humidStat = document.getElementById('humidStat');
  if (state.currentHumidity !== null) {
    humidStat.style.display = '';
    document.getElementById('humidValue').textContent =
      state.currentHumidity.toFixed(1) + '%';
    document.getElementById('humidTarget').textContent =
      state.targetHumidity !== null ? 'target ' + state.targetHumidity.toFixed(0) + '%' : '';
  } else {
    humidStat.style.display = 'none';
  }

  // Time left
  if (!state.active) {
    document.getElementById('timeLeft').textContent = '—';
  } else if (state.mode === 'humidity' && state.remainingSeconds === 0) {
    document.getElementById('timeLeft').textContent = '∞';
  } else {
    document.getElementById('timeLeft').textContent =
      formatSeconds(state.remainingSeconds);
  }

  // Progress bar (timed mode)
  const pw = document.getElementById('progressWrap');
  if (state.active && state.mode === 'timed' && totalSeconds > 0) {
    pw.style.display = '';
    const pct = Math.max(0, Math.min(100,
      100 * (1 - state.remainingSeconds / totalSeconds)));
    document.getElementById('progressFill').style.width = pct.toFixed(1) + '%';
    document.getElementById('progressPct').textContent = pct.toFixed(0) + '%';
  } else {
    pw.style.display = 'none';
  }

  // Sparkline (humidity mode with data)
  const sw = document.getElementById('sparklineWrap');
  if (state.mode === 'humidity' && humidityHistory.length > 1) {
    sw.style.display = '';
    drawSparkline();
  } else {
    sw.style.display = 'none';
  }

  // Stop button
  stopRow.style.display = state.active ? '' : 'none';
}

/* ========================================================================
   Live countdown (client-side, 1-second ticks)
   ======================================================================== */
function startCountdown(seconds) {
  stopCountdown();
  let remaining = seconds;
  countdownTimer = setInterval(() => {
    remaining = Math.max(0, remaining - 1);
    document.getElementById('timeLeft').textContent = formatSeconds(remaining);
    if (totalSeconds > 0) {
      const pct = 100 * (1 - remaining / totalSeconds);
      document.getElementById('progressFill').style.width = pct.toFixed(1) + '%';
      document.getElementById('progressPct').textContent = pct.toFixed(0) + '%';
    }
    if (remaining <= 0) stopCountdown();
  }, 1000);
}

function stopCountdown() {
  if (countdownTimer !== null) { clearInterval(countdownTimer); countdownTimer = null; }
}

/* ========================================================================
   Sparkline
   ======================================================================== */
function drawSparkline() {
  const canvas = document.getElementById('sparkline');
  const dpr = window.devicePixelRatio || 1;
  const W = canvas.parentElement.clientWidth || 300;
  const H = 70;
  canvas.width  = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';

  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, W, H);

  const vals = humidityHistory.map(p => p.v);
  const minV = Math.min(...vals) - 2;
  const maxV = Math.max(...vals) + 2;
  const range = maxV - minV || 1;

  const pad = 4;
  const xStep = (W - pad * 2) / Math.max(vals.length - 1, 1);

  // draw target humidity line
  if (state.targetHumidity !== null) {
    const ty = H - pad - ((state.targetHumidity - minV) / range) * (H - pad * 2);
    ctx.save();
    ctx.setLineDash([4, 4]);
    ctx.strokeStyle = '#66bb6a';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(pad, ty);
    ctx.lineTo(W - pad, ty);
    ctx.stroke();
    ctx.restore();
  }

  // gradient fill
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, 'rgba(79,195,247,0.3)');
  grad.addColorStop(1, 'rgba(79,195,247,0)');

  ctx.beginPath();
  vals.forEach((v, i) => {
    const x = pad + i * xStep;
    const y = H - pad - ((v - minV) / range) * (H - pad * 2);
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  });
  ctx.strokeStyle = '#4fc3f7';
  ctx.lineWidth = 2;
  ctx.stroke();

  // fill under line
  ctx.lineTo(pad + (vals.length - 1) * xStep, H - pad);
  ctx.lineTo(pad, H - pad);
  ctx.closePath();
  ctx.fillStyle = grad;
  ctx.fill();
}

/* ========================================================================
   Button handlers
   ======================================================================== */
function startTimed() {
  const temp    = parseFloat(document.getElementById('timedTemp').value) || 55;
  const hours   = parseFloat(document.getElementById('timedHours').value) || 0;
  const minutes = parseFloat(document.getElementById('timedMinutes').value) || 0;
  const seconds = parseFloat(document.getElementById('timedSeconds').value) || 0;
  const cmd = `VIVID_DRY_START TEMP=${temp} HOURS=${hours} MINUTES=${minutes} SECONDS=${seconds}`;
  totalSeconds = hours * 3600 + minutes * 60 + seconds;
  sendGcode(cmd).then(() => { toast('Timed cycle started'); poll(); })
                .catch(e => toast('Error: ' + e.message, true));
}

function startHumidity() {
  const humidity  = parseFloat(document.getElementById('humTarget').value) || 30;
  const tempMax   = parseFloat(document.getElementById('humTempMax').value) || 55;
  const tempMin   = parseFloat(document.getElementById('humTempMin').value) || 35;
  const maxHours  = parseFloat(document.getElementById('humMaxHours').value) || 0;
  let cmd = `VIVID_DRY_START HUMIDITY=${humidity} TEMP_MAX=${tempMax} TEMP_MIN=${tempMin}`;
  if (maxHours > 0) cmd += ` MAX_HOURS=${maxHours}`;
  sendGcode(cmd).then(() => { toast('Humidity-hold started'); poll(); })
                .catch(e => toast('Error: ' + e.message, true));
}

function sendStop() {
  sendGcode('VIVID_DRY_STOP')
    .then(() => { toast('Dryer stopped'); poll(); })
    .catch(e => toast('Error: ' + e.message, true));
}

/* ========================================================================
   Toast notification
   ======================================================================== */
function toast(msg, isError) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.background = isError ? '#7f1818' : '#323232';
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3000);
}

/* ========================================================================
   Utilities
   ======================================================================== */
function formatSeconds(s) {
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sec = Math.floor(s % 60);
  return [h, m, sec].map(n => String(n).padStart(2, '0')).join(':');
}

/* ========================================================================
   Init
   ======================================================================== */
poll();
setInterval(poll, POLL_INTERVAL_MS);
window.addEventListener('resize', () => {
  if (state.mode === 'humidity' && humidityHistory.length > 1) drawSparkline();
});
</script>
</body>
</html>
