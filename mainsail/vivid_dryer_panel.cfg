# ViViD Dryer — Mainsail convenience macros
# These macros wrap the raw GCode commands with named parameters for use as
# Mainsail quick-action buttons.
#
# For each additional ViViD unit, duplicate the macro blocks and change the
# suffix (_VIVID_1 -> _VIVID_2, etc.)

[gcode_macro VIVID_DRY_START_TIMED_VIVID_1]
description: Start a timed dry cycle on Vivid_1
gcode:
    {% set TEMP = params.TEMP|default(55)|float %}
    {% set HOURS = params.HOURS|default(4)|int %}
    {% set MINUTES = params.MINUTES|default(0)|int %}
    VIVID_DRY_START_VIVID_1 TEMP={TEMP} HOURS={HOURS} MINUTES={MINUTES}

[gcode_macro VIVID_DRY_START_HUMIDITY_VIVID_1]
description: Start humidity-hold mode on Vivid_1
gcode:
    {% set HUMIDITY = params.HUMIDITY|default(30)|float %}
    {% set TEMP_MAX = params.TEMP_MAX|default(55)|float %}
    {% set TEMP_MIN = params.TEMP_MIN|default(35)|float %}
    {% set MAX_HOURS = params.MAX_HOURS|default(0)|int %}
    VIVID_DRY_START_VIVID_1 HUMIDITY={HUMIDITY} TEMP_MAX={TEMP_MAX} TEMP_MIN={TEMP_MIN} MAX_HOURS={MAX_HOURS}

