# vivid_dryer_panel.cfg
# Mainsail quick-action macros for the ViViD dryer.
#
# Add this file to your config directory and include it in printer.cfg:
#   [include mainsail/vivid_dryer_panel.cfg]
#
# In Mainsail → Settings → Macros you can pin these macros to the
# dashboard as quick-action buttons.

# ---------------------------------------------------------------------------
# Timed mode convenience wrapper
# ---------------------------------------------------------------------------
# Usage example: VIVID_DRY_START_TIMED TEMP=55 HOURS=4
[gcode_macro VIVID_DRY_START_TIMED]
description: Start a timed ViViD dryer cycle (TEMP, HOURS, MINUTES, SECONDS)
gcode:
    {% set temp    = params.TEMP    | default(55)  | float %}
    {% set hours   = params.HOURS   | default(4)   | float %}
    {% set minutes = params.MINUTES | default(0)   | float %}
    {% set seconds = params.SECONDS | default(0)   | float %}
    VIVID_DRY_START TEMP={temp} HOURS={hours} MINUTES={minutes} SECONDS={seconds}

# ---------------------------------------------------------------------------
# Humidity-hold mode convenience wrapper
# ---------------------------------------------------------------------------
# Usage example: VIVID_DRY_START_HUMIDITY HUMIDITY=30 TEMP_MAX=55 TEMP_MIN=35
[gcode_macro VIVID_DRY_START_HUMIDITY]
description: Start humidity-hold mode (HUMIDITY, TEMP_MAX, TEMP_MIN, MAX_HOURS)
gcode:
    {% set humidity  = params.HUMIDITY  | default(30)  | float %}
    {% set temp_max  = params.TEMP_MAX  | default(55)  | float %}
    {% set temp_min  = params.TEMP_MIN  | default(35)  | float %}
    {% set max_hours = params.MAX_HOURS | default(0)   | float %}
    {% if max_hours > 0 %}
        VIVID_DRY_START HUMIDITY={humidity} TEMP_MAX={temp_max} TEMP_MIN={temp_min} MAX_HOURS={max_hours}
    {% else %}
        VIVID_DRY_START HUMIDITY={humidity} TEMP_MAX={temp_max} TEMP_MIN={temp_min}
    {% endif %}

# ---------------------------------------------------------------------------
# Preset shortcuts — uncomment and adjust as needed
# ---------------------------------------------------------------------------

# PLA (low humidity, gentle heat)
# [gcode_macro VIVID_DRY_PLA]
# description: Dry PLA at 45°C for 4 hours
# gcode:
#     VIVID_DRY_START TEMP=45 HOURS=4

# PETG
# [gcode_macro VIVID_DRY_PETG]
# description: Dry PETG at 55°C for 6 hours
# gcode:
#     VIVID_DRY_START TEMP=55 HOURS=6

# ABS / ASA
# [gcode_macro VIVID_DRY_ABS]
# description: Dry ABS at 65°C for 4 hours
# gcode:
#     VIVID_DRY_START TEMP=65 HOURS=4

# Nylon / PA
# [gcode_macro VIVID_DRY_NYLON]
# description: Dry Nylon at 65°C for 12 hours
