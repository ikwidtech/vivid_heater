# vivid_dryer_panel.cfg
# Mainsail quick-action macros for the ViViD dryer.
#
# Add this file to your config directory and include it in printer.cfg:
#   [include vivid_dryer_panel.cfg]
#
# In Mainsail -> Settings -> Macros you can pin these macros to the
# dashboard as quick-action buttons.
#
# One set of macros is provided per physical ViViD unit.  The macros call the
# namespaced GCode commands registered by [vivid_dryer Vivid_1] etc.

# ---------------------------------------------------------------------------
# Vivid_1 - timed mode wrapper
# ---------------------------------------------------------------------------
# Example: VIVID_1_DRY_TIMED TEMP=55 HOURS=4
[gcode_macro VIVID_1_DRY_TIMED]
description: Start a timed dry cycle on Vivid_1 (TEMP, HOURS, MINUTES, SECONDS)
gcode:
    {% set temp    = params.TEMP    | default(55)  | float %}
    {% set hours   = params.HOURS   | default(4)   | float %}
    {% set minutes = params.MINUTES | default(0)   | float %}
    {% set seconds = params.SECONDS | default(0)   | float %}
    VIVID_DRY_START_VIVID_1 TEMP={temp} HOURS={hours} MINUTES={minutes} SECONDS={seconds}

# ---------------------------------------------------------------------------
# Vivid_1 - humidity-hold mode wrapper
# ---------------------------------------------------------------------------
# Example: VIVID_1_DRY_HUMIDITY HUMIDITY=30 TEMP_MAX=55 TEMP_MIN=35
[gcode_macro VIVID_1_DRY_HUMIDITY]
description: Start humidity-hold mode on Vivid_1 (HUMIDITY, TEMP_MAX, TEMP_MIN, MAX_HOURS)
gcode:
    {% set humidity  = params.HUMIDITY  | default(30)  | float %}
    {% set temp_max  = params.TEMP_MAX  | default(55)  | float %}
    {% set temp_min  = params.TEMP_MIN  | default(35)  | float %}
    {% set max_hours = params.MAX_HOURS | default(0)   | float %}
    {% if max_hours > 0 %}
        VIVID_DRY_START_VIVID_1 HUMIDITY={humidity} TEMP_MAX={temp_max} TEMP_MIN={temp_min} MAX_HOURS={max_hours}
    {% else %}
        VIVID_DRY_START_VIVID_1 HUMIDITY={humidity} TEMP_MAX={temp_max} TEMP_MIN={temp_min}
    {% endif %}

# ---------------------------------------------------------------------------
# Vivid_1 - stop / status
# ---------------------------------------------------------------------------
[gcode_macro VIVID_1_DRY_STOP]
description: Stop an active drying cycle on Vivid_1
gcode:
    VIVID_DRY_STOP_VIVID_1

[gcode_macro VIVID_1_DRY_STATUS]
description: Report current dryer status for Vivid_1
gcode:
    VIVID_DRY_STATUS_VIVID_1

