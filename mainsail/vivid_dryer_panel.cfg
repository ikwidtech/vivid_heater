# vivid_dryer_panel.cfg — Mainsail quick-action macros for the ViViD dryer.
#
# Add to printer.cfg:
#   [include mainsail/vivid_dryer_panel.cfg]
#
# In Mainsail → Settings → Macros you can pin these macros to the dashboard
# as one-click buttons.  Pass parameters through the Mainsail macro dialog or
# call them directly from the console.

# ---------------------------------------------------------------------------
# Vivid_1 — timed mode
# ---------------------------------------------------------------------------
# Usage: VIVID_DRY_START_TIMED_VIVID_1 [TEMP=55] [HOURS=4] [MINUTES=0] [SECONDS=0]
[gcode_macro VIVID_DRY_START_TIMED_VIVID_1]
description: Start a timed ViViD dryer cycle on Vivid_1 (TEMP, HOURS, MINUTES, SECONDS)
gcode:
    {% set temp    = params.TEMP    | default(55) | float %}
    {% set hours   = params.HOURS   | default(4)  | float %}
    {% set minutes = params.MINUTES | default(0)  | float %}
    {% set seconds = params.SECONDS | default(0)  | float %}
    VIVID_DRY_START_VIVID_1 TEMP={temp} HOURS={hours} MINUTES={minutes} SECONDS={seconds}

# ---------------------------------------------------------------------------
# Vivid_1 — humidity-hold mode
# ---------------------------------------------------------------------------
# Usage: VIVID_DRY_START_HUMIDITY_VIVID_1 [HUMIDITY=30] [TEMP_MAX=55] [TEMP_MIN=35] [MAX_HOURS=0]
[gcode_macro VIVID_DRY_START_HUMIDITY_VIVID_1]
description: Start humidity-hold mode on Vivid_1 (HUMIDITY, TEMP_MAX, TEMP_MIN, MAX_HOURS)
gcode:
    {% set humidity  = params.HUMIDITY  | default(30) | float %}
    {% set temp_max  = params.TEMP_MAX  | default(55) | float %}
    {% set temp_min  = params.TEMP_MIN  | default(35) | float %}
    {% set max_hours = params.MAX_HOURS | default(0)  | float %}
    {% if max_hours > 0 %}
        VIVID_DRY_START_VIVID_1 HUMIDITY={humidity} TEMP_MAX={temp_max} TEMP_MIN={temp_min} MAX_HOURS={max_hours}
    {% else %}
        VIVID_DRY_START_VIVID_1 HUMIDITY={humidity} TEMP_MAX={temp_max} TEMP_MIN={temp_min}
    {% endif %}

